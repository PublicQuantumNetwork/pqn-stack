<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% set page_name = request.path.strip('/').split('/')[-1] %}
    <title>Pulic Quantum Network
        {%- if page_name != "" %}
        | {{ page_name }}
        {% endif -%}
    </title>

    <link href="{{ url_for('static', path='css/styles.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', path='js/htmx.min.js') }}"></script>
    {%- if background_image %}
    <style>
        body {
            background-image: url("{{ url_for('static', path=background_image) }}");
            background-size: cover;
            background-position: center;
        }
    </style>
    {% else %}
    <style>
        body {
            background: #eee
        }
    </style>
    {% endif -%}

    <style>
        body::before {
            content: "";
            position: absolute;
            --scale: 0.8;
            top: calc(100vh*var(--scale)/2);
            left: calc(100vw*var(--scale)/8);
            width: var(--scale);
            height: var(--scale);
            background-color: rgba(255, 255, 255, 0.1);
            /* Adjust color and opacity as needed */
            z-index: 1;
        }
    </style>
</head>

<nav class="navbar navbar-toggleable-md navbar-expand-md navbar-dark bg-dark">

</nav>
